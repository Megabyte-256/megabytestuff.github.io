<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <title>Counter</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <text id="text">0</text><br>
  <button id="increase" class="buttons">Increase</button>
  <button id="reset" class="buttons">Reset</button>
  <button id="decrease" class="buttons">Decrease</button>
  <button id="custom" class="buttons">Custom</button>
  <script src="script.js"></script>
  <script>
  if (typeof navigator.serviceWorker !== 'undefined') {
    navigator.serviceWorker.register('sw.js')
  }
</script>
